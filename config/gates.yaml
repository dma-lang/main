# Validation gates G1-G8 thresholds. The gates are DETERMINISTIC CODE (backend/app/intelligence/gates.py);
# this file only parameterises them. Thresholds are recalibrated from analyst feedback (config, not code).
# Every AI-derived mutation must pass all gates; an apply re-gates server-side and writes a snapshot + audit row.

gates:
  G1_identity_schema:
    description: Referenced entity exists in the active version and the payload matches the canonical schema.
    enabled: true

  G2_evidence_sufficiency:
    description: Minimum count of independent supporting evidence items.
    min_independent_evidence: 2

  G3_source_tier_floor:
    description: Evidence at or above a configured source-tier minimum (one low-tier source repeated fails).
    min_source_tier: T3          # T1 (regulator) .. T5 (vendor self-promotion); lower index = higher trust
    distinct_sources_required: 2

  G4_claim_label_consistency:
    description: Claim labels (FACT/INFERENCE/HYPOTHESIS/CEILING_ESTIMATE) are internally consistent.
    enabled: true

  G5_similarity_grounding:
    description: Every claim cites a retrieved evidence id; answers outside retrieved context are refused.
    min_match_similarity: 0.70   # below this a SOW/story match is 'unmapped' (nearest-neighbour proposal kept)
    require_citation: true

  G6_contradiction:
    description: Reject proposals that contradict delivery reality (stories) or other high-tier evidence.
    enabled: true

  G7_citation_verification:
    description: Cited evidence ids resolve to stored, retrievable chunks.
    enabled: true

  G8_budget_rate:
    description: Enforce cost/token + grounding-query budget; block proposals that exceed the envelope.
    enabled: true                # numeric caps come from config/models.yaml: cost.*

# Evidence-mapping relevance thresholds (News watch D1 / vendor F2 ingest). Calibrated against
# lexical ts_rank over the provisioned catalogue: probed real public-source items rank >= 0.029
# on their target subcaps while off-catalogue noise tops out <= 0.017. Recalibrate (analyst
# feedback / weekly eval) when F6 dense retrieval layers on — cosine ranks live on another scale.
evidence:
  relevance_floor: 0.025         # matches below this are noise — never mapped; zero above the floor -> G5 fail -> Change Flags
  strong_grounding: 0.04         # top match below this = weak grounding -> claim label downgraded one notch, scores scaled down

# Benchmarks studio (D4). "Too few observations -> coverage-gap banner (no false precision)" —
# the spec names no number, so the floor lives here (recalibrated like every threshold). The
# bootstrap parameters document the CI method (seeded resample of the median).
benchmarks:
  min_observations: 8            # below this the benchmark is thin -> coverage-gap banner, CI band suppressed
  bootstrap_resamples: 1000
  ci_level: 0.95

# Carry-forward + matching confidence bands (story_subcap_carry, sow_subcap_match).
matching:
  auto_confirm_at: 0.86          # >= confirm
  review_band_low: 0.70          # [0.70, 0.86) -> route to review
  # < 0.70 -> unmapped, keep nearest-neighbour proposal, never drop
  # QA on the nearest-neighbour matcher (avoid matching the wrong story): a DENSE (embedding) cosine
  # at/above this corroborates a match to confirm-grade ("deep learning"); a cross-pillar match is
  # flagged for review, never auto-confirmed.
  dense_corroboration_min_cosine: 0.82
  require_pillar_for_confirm: true

# Knowledge-graph Layer B proposal thresholds (pending_edge; gated + human-approved before commit).
knowledge_graph:
  semantically_similar_min_cosine: 0.85   # Phase B (live embeddings): SEMANTICALLY_SIMILAR floor
  # Phase A (deterministic, structural): two CROSS-capability subcaps sharing at least this many
  # distinct L3 platforms -> a SHARES_PLATFORM proposal; sharing this many personas -> SHARES_FEATURE.
  # Both >= 2 so G2 (>= 2 supporting items) always passes for a real proposal.
  shares_platform_min_shared: 2
  shares_feature_min_shared: 2
  shares_offering_min_shared: 2           # R5: cross-cap subcaps sharing >= N offerings -> SHARES_OFFERING
  same_value_chain_min_shared: 2          # R5: cross-cap subcaps sharing >= N value-chain clusters -> SAME_VALUE_CHAIN
  # R5 co-delivery association mining over the Jira corpus (control.story_catalogue_link): a CROSS-
  # capability subcap pair co-delivered by the same client (project_key) AND/OR in the same story,
  # with market-basket lift = P(A&B)/(P(A)*P(B)) at/above this floor AND a co-count at/above the
  # minimum -> a CO_DELIVERED proposal (the latent core). Deterministic counts; co_min >= 2 keeps G2.
  co_delivery_min_lift: 2.0
  co_delivery_min_count: 3
  # R5 novelty = strength * (1 - novelty_weight * structural_obviousness): a strong pair that is NOT
  # already obvious (different pillar, no shared platform) ranks highest in "relationships you may be
  # missing". novelty_weight in [0,1] tunes how hard obviousness suppresses (1.0 = full).
  novelty_weight: 1.0
  # R5 Decision (D16): allow gated CROSS-PILLAR edge proposals (the most non-obvious links). They are
  # only ever HYPOTHESIS/INFERENCE proposals through G1-G8 + Change Flags, never a committed surface.
  allow_cross_pillar: true
  max_proposals_per_scan: 200             # bound the run (resilience: bounded everything)
  # R6 NLP DIRECTIONAL relationship engine (services/kg.propose_directional_edges + Gemini
  # infer_relationship / verify_relationship). Per subcap a BOUNDED candidate set (semantic kNN +
  # co-delivery + structural + keyphrase overlap) is read by the enrich model into a TYPED,
  # DIRECTIONAL relation (enables/depends_on/precedes/affects/complements/alternative_to/subsumes),
  # then DUAL-verified — an adversarial refutation AND corpus corroboration against the Jira
  # delivery corpus — before a gated proposal. Live spend, so bounded + metered (G8 + cost meter).
  directional_candidate_cap: 12           # max candidate partners per subcap (bounds live spend)
  directional_semantic_knn: 8             # nearest semantic neighbours seeded per subcap
  directional_confidence_floor: 0.45      # drop an inferred relation below this confidence
  directional_verify_passes: 3            # adversarial refutation passes (live); majority refutes
  directional_corroboration_lift: 1.5     # co-delivery lift a depends_on/complements must clear
  directional_max_per_scan: 150           # bound the whole directional run (bounded everything)

# Use-case gap detector (services/use_case_gaps): surface use cases IMPLIED by delivered Jira stories
# that the catalogue does NOT yet model, and propose each as a gated, human-approved NEW use case.
# For each subcap it takes the carried real-Jira stories NOT attributed to any existing use case,
# embeds + clusters their summaries, and proposes a cluster only when it is BOTH large enough AND
# genuinely uncovered. STRICT overlap-avoidance so nothing bloats: a cluster whose centroid is
# >= overlap_max_cosine to any of the subcap's EXISTING use cases (name + description embedded) is
# SKIPPED as already covered. Config, not code — recalibrated without a deploy.
use_case_gap:
  min_stories: 4                # uncovered-delivery volume floor a cluster needs to be a candidate (>= 2 so G2 passes)
  overlap_max_cosine: 0.82      # cluster centroid >= this cosine to an EXISTING use case -> already covered, skipped (no bloat)
  cluster_min_cosine: 0.55      # an unmatched story joins a cluster when it is >= this cosine to the cluster seed
  max_proposals_per_scan: 1000  # bound the run (resilience: bounded everything); high enough to surface every real gap in one pass

# Unscoped-subvertical discovery (clients delivering outside the 9 modelled subverticals).
# A candidate is proposed only with real volume AND when the client is not already an existing SV.
unscoped_subverticals:
  min_stories: 25                # real-Jira volume floor for a client to be a candidate (filters noise)
  overlap_max: 0.5              # client already >= this fraction an existing SV -> not a NEW subvertical
  # DEEP cross-check (beyond the semantic name): a candidate's delivered-subcap footprint must be
  # < this Jaccard against EVERY modelled subvertical, else it's an existing SV's untagged delivery.
  distinctness_max_jaccard: 0.5

# Trend detection signal weights + emergence cutoff (trends are earned, not counted).
trends:
  weight_velocity: 0.35
  weight_diversity: 0.30
  weight_novelty: 0.20
  weight_persistence: 0.15
  emergent_cut: 0.80             # novelty above this flags an emergent subcap (only path a synthetic story surfaces)
  trend_threshold: 0.45          # composite-score floor a cluster must clear to surface (recalibrated from precision/recall)
  dedupe_cosine: 0.95
  min_cluster: 4
  min_sources: 3

# Productized-offering -> subcap semantic matching (services/offerings_match). The matcher grounds
# the GTM offerings doc into the catalogue by MEANING (hybrid dense + lexical retrieval per named
# capability); only matches at/above the score floor are kept, bounded per offering. These matches
# are the trust-enveloped basis for offering coverage / gaps. Config, not code.
offerings:
  match_floor: 0.12             # combined hybrid-score floor — below this a subcap is NOT matched
  top_k_per_capability: 8       # candidate subcaps retrieved per named capability
  max_subcaps_per_offering: 30  # bound the matches kept per offering (resilience: bounded everything)

# Story -> use-case matching (services/use_case_match). Carry-forward maps a story to a SUBCAP only,
# so every use case under a subcap shows that subcap's full delivery (the "static number"). This
# attributes each carried story to the best-matching USE CASE of its subcap by term-frequency cosine
# (the story summary vs the use-case title + description), so per-use-case delivery is REAL — under
# single best match the counts PARTITION the subcap's stories across its use cases. Below the floor
# the match still counts (nothing is dropped) but is flagged 'review' (weak overlap). Config, not code.
use_case_match:
  match_floor: 0.06             # hybrid score below this -> matched but status='review'
  multi_match: false            # single best match (partition) vs multi-match (a story -> several use cases)
  # R6 HYBRID matching: the score is (1 - semantic_weight)*TF-IDF-cosine + semantic_weight*embedding-
  # cosine (gemini-embedding-001; hermetic = deterministic token-hash, so still zero-spend + stable).
  # The dense half RERANKS the candidate use cases + sets the confidence. A story is attributed when it
  # shares a discriminating TERM (as before — preserves the unmatched set the gap detector needs) OR is
  # STRONGLY semantically near a use case (embedding cosine >= semantic_match_floor), so a summary that
  # MEANS the same as a use case without sharing a word is caught, while baseline noise stays unmatched.
  semantic_weight: 0.5          # 0 = pure lexical (legacy), 1 = pure semantic; 0.5 = balanced hybrid
  semantic_match_floor: 0.82    # embedding cosine at/above this attributes even with no term overlap

# Cross-version subcap resolution SEMANTIC tier (services/subcap_xref, rule 5): a legacy version
# (lower than the active version) whose ids AND L1/L2 names drifted is enriched from the standard
# versions (v5/v7) by MEANING when the lexical rules (id / crosswalk / L2-name) find nothing —
# deep-learning matching over the subcap + L2 (capability) embeddings. Config, not code.
xref:
  semantic_min_cosine: 0.62      # a drifted subcap must embed at least this close to a reference subcap
  l2_semantic_min_cosine: 0.60   # ...and its L2 name this close to scope the search to that capability
