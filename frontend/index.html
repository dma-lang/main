<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capability Intelligence Agent</title>
    <script>
      // Pre-paint theme set to avoid a flash of the wrong theme.
      try {
        const t = localStorage.getItem('cia_theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
      } catch (_) {
        /* ignore */
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
